<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Image Scraper</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 20px;
      color: #111;
      line-height: 1.5;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    p.sub { color: #555; margin-top: 0; }
    form { margin-top: 24px; display: flex; gap: 8px; }
    input[type="url"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    button, .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .login-row { margin-top: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .login-row a { color: #0066cc; }
    .badge { font-size: 0.85rem; color: #145a1e; background: #eefaf0; padding: 4px 8px; border-radius: 6px; }
    .message { margin-top: 20px; padding: 12px 16px; border-radius: 8px; }
    .message.info { background: #eef6ff; color: #004080; }
    .message.success { background: #eefaf0; color: #145a1e; }
    .message.error { background: #fff0f0; color: #8b0000; }
    .folder-path {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      word-break: break-all;
      margin: 8px 0 12px;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .btn.secondary { background: #444; }
  </style>
</head>
<body>
  <h1>News Image Scraper</h1>
  <p class="sub">Pulls <code>&lt;img&gt;</code> tags from the page — like Inspect Element.</p>

  {% if setup_message %}
  <div class="message success">{{ setup_message }}</div>
  {% endif %}
  {% if setup_error %}
  <div class="message error">{{ setup_error }}</div>
  {% endif %}

  <div class="login-row">
    <a href="/login">Log in</a>
    <span>— sign into NYT, WSJ, WaPo first (opens a browser window)</span>
    {% if logged_in %}<span class="badge">Logged in</span>{% endif %}
  </div>

  <form id="scrape-form">
    <input type="url" id="url" name="url" placeholder="https://www.nytimes.com/..." required>
    <button type="submit" id="submit-btn">Scrape images</button>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById("scrape-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = document.getElementById("url").value.trim();
      if (!url) return;

      submitBtn.disabled = true;
      statusEl.innerHTML = '<div class="message info">Scraping…</div>';

      try {
        const res = await fetch("/scrape", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (data.ok) {
          let actions = data.zip_url
            ? `<div class="actions"><a class="btn secondary" href="${data.zip_url}">Download zip</a></div>`
            : `<div class="actions"><button type="button" class="btn secondary" id="reveal-btn">Reveal in Finder</button></div>`;

          statusEl.innerHTML = `
            <div class="message success">
              <strong>Saved ${data.count} image${data.count === 1 ? "" : "s"}</strong>
              <div class="folder-path">${data.folder}</div>
              ${actions}
            </div>`;

          const revealBtn = document.getElementById("reveal-btn");
          if (revealBtn) {
            revealBtn.addEventListener("click", () => {
              fetch("/reveal/" + encodeURIComponent(data.folder_id));
            });
          }
        } else {
          statusEl.innerHTML = `<div class="message error">${data.error || "Scrape failed."}</div>`;
        }
      } catch (err) {
        statusEl.innerHTML = `<div class="message error">Request failed: ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
